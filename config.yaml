# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: balancer-indexer
description: Balancer Protocol Unified Indexer

field_selection:
  transaction_fields:
    - hash
    - from

contracts:
  # ===== V3 Vault =====
  - name: V3Vault
    events:
      - event: "PoolRegistered(address indexed pool, address indexed factory, (address,uint8,address,bool)[] tokenConfig, uint256 pauseWindowEndTime, address indexed roleAccount, (address,bool,bool,bool,bool,bool,bool,bool,bool,bool) hooksConfig, (bool,bool,bool,bool) liquidityManagement, (address,address,address) roleAccounts)"
      - event: "Swap(address indexed pool, address indexed tokenIn, address indexed tokenOut, uint256 amountIn, uint256 amountOut, uint256 swapFeePercentage, uint256 swapFeeAmount)"
      - event: "LiquidityAdded(address indexed pool, address indexed liquidityProvider, int256[] deltas, uint256[] amountsAddedRaw, uint256[] swapFeeAmountsRaw)"
      - event: "LiquidityRemoved(address indexed pool, address indexed liquidityProvider, int256[] deltas, uint256[] amountsRemovedRaw, uint256[] swapFeeAmountsRaw)"
      - event: "LiquidityAddedToBuffer(address indexed wrappedToken, uint256 amountUnderlying, uint256 amountWrapped)"
      - event: "LiquidityRemovedFromBuffer(address indexed wrappedToken, uint256 amountUnderlying, uint256 amountWrapped)"
      - event: "BufferSharesMinted(address indexed wrappedToken, address indexed to, uint256 issuedShares)"
      - event: "BufferSharesBurned(address indexed wrappedToken, address indexed from, uint256 burnedShares)"
      - event: "Wrap(address indexed wrappedToken, uint256 burnedShares, uint256 mintedShares, bytes32 bufferBalances)"
      - event: "Unwrap(address indexed wrappedToken, uint256 burnedShares, uint256 mintedShares, bytes32 bufferBalances)"
      - event: "SwapFeePercentageChanged(address indexed pool, uint256 swapFeePercentage)"
      - event: "PoolRecoveryModeStateChanged(address indexed pool, bool recoveryMode)"
      - event: "PoolPausedStateChanged(address indexed pool, bool paused)"
      - event: "ProtocolFeeControllerChanged(address indexed newProtocolFeeController)"

  # ===== V3 Protocol Fee Controller =====
  - name: V3ProtocolFeeController
    events:
      - event: "GlobalProtocolSwapFeePercentageChanged(uint256 swapFeePercentage)"
      - event: "GlobalProtocolYieldFeePercentageChanged(uint256 yieldFeePercentage)"
      - event: "PoolCreatorSwapFeePercentageChanged(address indexed pool, uint256 poolCreatorSwapFeePercentage)"
      - event: "PoolCreatorYieldFeePercentageChanged(address indexed pool, uint256 poolCreatorYieldFeePercentage)"
      - event: "ProtocolSwapFeePercentageChanged(address indexed pool, uint256 swapFeePercentage)"
      - event: "ProtocolYieldFeePercentageChanged(address indexed pool, uint256 yieldFeePercentage)"
      - event: "ProtocolSwapFeeCollected(address indexed pool, address indexed token, uint256 amount)"
      - event: "ProtocolYieldFeeCollected(address indexed pool, address indexed token, uint256 amount)"
      - event: "ProtocolFeesWithdrawn(address indexed pool, address indexed token, uint256 amount)"

  # ===== V3 BPT (dynamic — registered on PoolRegistered) =====
  - name: V3BPT
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  # ===== V3 Factory Contracts =====
  - name: V3WeightedPoolFactory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3WeightedPoolV2Factory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3StablePoolFactory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3StablePoolV2Factory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3StablePoolV3Factory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3Gyro2CLPPoolFactory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3GyroECLPPoolFactory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3QuantAMMWeightedPoolFactory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3LBPoolFactory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3LBPoolV2Factory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3LBPoolV3Factory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3FixedPriceLBPoolFactory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3ReClammPoolFactory
    events:
      - event: "PoolCreated(address indexed pool)"
  - name: V3ReClammPoolV2Factory
    events:
      - event: "PoolCreated(address indexed pool)"

  # ===== V3 Hooks (fixed addresses) =====
  - name: V3StableSurgeHook
    events:
      - event: "StableSurgeHookRegistered(address indexed pool, address indexed factory)"
  - name: V3StableSurgeHookV2
    events:
      - event: "StableSurgeHookRegistered(address indexed pool, address indexed factory)"

  # ===== V3 ReClamm Pool (dynamic) =====
  - name: V3ReClammPool
    events:
      - event: "CenterednessMarginUpdated(uint256 centerednessMargin)"
      - event: "LastTimestampUpdated(uint32 lastTimestamp)"
      - event: "VirtualBalancesUpdated(uint256 virtualBalanceA, uint256 virtualBalanceB)"
      - event: "DailyPriceShiftExponentUpdated(uint256 dailyPriceShiftExponent, uint256 dailyPriceShiftBase)"
      - event: "PriceRatioStateUpdated(uint256 priceRatioUpdateStartTime, uint256 priceRatioUpdateEndTime, uint256 startFourthRootPriceRatio, uint256 endFourthRootPriceRatio)"

  # ===== V2 Vault =====
  - name: V2Vault
    events:
      - event: "Swap(bytes32 indexed poolId, address indexed tokenIn, address indexed tokenOut, uint256 amountIn, uint256 amountOut)"
      - event: "PoolBalanceChanged(bytes32 indexed poolId, address indexed liquidityProvider, address[] tokens, int256[] deltas, uint256[] protocolFeeAmounts)"
      - event: "PoolBalanceManaged(bytes32 indexed poolId, address indexed assetManager, address indexed token, int256 cashDelta, int256 managedDelta)"
      - event: "InternalBalanceChanged(address indexed user, address indexed token, int256 delta)"

  # ===== V2 Event Emitter =====
  - name: V2EventEmitter
    events:
      - event: "LogArgument(address indexed pool, bytes32 indexed topic, bytes data, uint256 logIndex)"

  # ===== V2 Pool Factory (covers all regular factories) =====
  - name: V2PoolFactory
    events:
      - event: "PoolCreated(address indexed pool)"

  # ===== V2 Pool (dynamic — registered on PoolCreated) =====
  - name: V2Pool
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
      - event: "SwapFeePercentageChanged(uint256 swapFeePercentage)"
      - event: "PausedStateChanged(bool paused)"
      - event: "RecoveryModeStateChanged(bool enabled)"
      - event: "ProtocolFeePercentageCacheUpdated(uint256 indexed feeType, uint256 protocolSwapFeePercentage)"
      - event: "AmpUpdateStarted(uint256 startValue, uint256 endValue, uint256 startTime, uint256 endTime)"
      - event: "AmpUpdateStopped(uint256 currentValue)"
      - event: "SwapEnabledSet(bool swapEnabled)"
      - event: "GradualWeightUpdateScheduled(uint256 startTime, uint256 endTime, uint256[] startWeights, uint256[] endWeights)"
      - event: "OracleEnabledChanged(bool enabled)"
      - event: "TargetsSet(address indexed token, uint256 lowerTarget, uint256 upperTarget)"
      - event: "PausedLocally()"
      - event: "UnpausedLocally()"

  # ===== V2 Protocol ID Registry =====
  - name: V2ProtocolIdRegistry
    events:
      - event: "ProtocolIdRegistered(uint256 indexed protocolId, string name)"
      - event: "ProtocolIdRenamed(uint256 indexed protocolId, string name)"

  # ===== Gauge Contracts =====

  # GaugeController — mainnet + sepolia only
  - name: GaugeController
    events:
      - event: "AddType(string name, int128 type_id)"
      - event: "NewGauge(address addr, int128 gauge_type, uint256 weight)"
      - event: "VoteForGauge(uint256 time, address user, address gauge_addr, uint256 weight)"

  # VotingEscrow — mainnet + sepolia only
  - name: VotingEscrowContract
    events:
      - event: "Deposit(address indexed provider, uint256 value, uint256 indexed locktime, int128 depositType, uint256 ts)"
      - event: "Withdraw(address indexed provider, uint256 value, uint256 ts)"
      - event: "Supply(uint256 prevSupply, uint256 supply)"

  # OmniVotingEscrow — mainnet only (bridges veBAL to L2s)
  - name: OmniVotingEscrow
    events:
      - event: "UserBalToChain(uint16 dstChainId, address localUser, address remoteUser, (int128,int128,uint256,uint256) localUserPoint, (int128,int128,uint256,uint256) newUserPoint)"

  # OmniVotingEscrowChild — child chains (receives bridged veBAL)
  - name: OmniVotingEscrowChild
    events:
      - event: "UserBalFromChain(uint16 srcChainId, address user, (int128,int128,uint256,uint256) oldUserPoint, (int128,int128,uint256,uint256) userPoint)"

  # AuthorizerAdaptorEntrypoint — all chains (reward token management)
  - name: GaugeAuthorizerAdaptor
    events:
      - event: "ActionPerformed(bytes4 indexed selector, address indexed target, address indexed caller, bytes data)"

  # Mainnet liquidity gauge factory V1 — GaugeCreated with 2 params
  - name: GaugeLiquidityV1Factory
    events:
      - event: "GaugeCreated(address indexed gauge, address indexed pool)"

  # Mainnet liquidity gauge factory V2+ — GaugeCreated with 1 param
  - name: GaugeLiquidityV2Factory
    events:
      - event: "GaugeCreated(address indexed gauge)"
        name: LiquidityGaugeV2Created

  # Child chain gauge V1 factory — RewardsOnlyGauge
  - name: ChildChainGaugeV1Factory
    events:
      - event: "RewardsOnlyGaugeCreated(address indexed gauge, address indexed pool, address streamer)"

  # Child chain gauge V2+ factory
  - name: ChildChainGaugeV2Factory
    events:
      - event: "GaugeCreated(address indexed gauge)"
        name: ChildChainGaugeV2Created

  # SingleRecipientGauge factory V1
  - name: SingleRecipientGaugeV1Factory
    events:
      - event: "SingleRecipientGaugeCreated(address indexed gauge, address indexed recipient)"

  # SingleRecipientGauge factory V2
  - name: SingleRecipientGaugeV2Factory
    events:
      - event: "GaugeCreated(address indexed gauge)"
        name: SingleRecipientGaugeV2Created

  # Root gauge V1 factories (mainnet only, per-chain events)
  - name: ArbitrumRootGaugeV1Factory
    events:
      - event: "ArbitrumRootGaugeCreated(address indexed gauge, address indexed recipient)"

  - name: PolygonRootGaugeV1Factory
    events:
      - event: "PolygonRootGaugeCreated(address indexed gauge, address indexed recipient)"

  - name: OptimismRootGaugeV1Factory
    events:
      - event: "OptimismRootGaugeCreated(address indexed gauge, address indexed recipient)"

  # Root gauge V2 factory (mainnet only, all chains share same event)
  - name: RootGaugeV2Factory
    events:
      - event: "GaugeCreated(address indexed gauge)"
        name: RootGaugeV2Created

  # Dynamic gauge contracts (no address — registered by factories)
  - name: GaugeLiquidityGauge
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
        name: GaugeLiquidityGaugeTransfer
      - event: "RelativeWeightCapChanged(uint256 new_relative_weight_cap)"

  - name: GaugeRewardsOnlyGauge
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"
        name: GaugeRewardsOnlyTransfer

  - name: GaugeChildChainStreamer
    events:
      - event: "RewardDurationUpdated(address indexed reward_token, uint256 duration)"

  - name: GaugeRootGauge
    events:
      - event: "RelativeWeightCapChanged(uint256 new_relative_weight_cap)"
        name: RootGaugeRelativeWeightCapChanged

  - name: GaugeSingleRecipientGauge
    events:
      - event: "RelativeWeightCapChanged(uint256 new_relative_weight_cap)"
        name: SingleRecipientRelativeWeightCapChanged

  - name: GaugeInjectorContract
    events:
      - event: "EmissionsInjection(address gauge, address token, uint256 amount)"

