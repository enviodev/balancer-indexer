# ===== Gauge Entities =====

enum GaugeChain {
  Arbitrum
  Gnosis
  Polygon
  Optimism
  Avalanche
  PolygonZkEvm
  Base
  Fraxtal
}

type VotingEscrow {
  id: ID!
  stakedSupply: BigDecimal
  locks: [VotingEscrowLock!]! @derivedFrom(field: "votingEscrowID_id")
  omniLocks: [OmniVotingEscrowLock!]! @derivedFrom(field: "votingEscrowID_id")
}

type OmniVotingEscrowLock {
  id: ID!
  localUser_id: String! @index
  remoteUser: String!
  dstChainId: Int!
  bias: BigDecimal!
  slope: BigDecimal!
  timestamp: Int! @index
  votingEscrowID_id: String! @index
}

type VotingEscrowLock {
  id: ID!
  user_id: String! @index
  bias: BigDecimal!
  slope: BigDecimal!
  timestamp: Int! @index
  unlockTime: BigInt!
  lockedBalance: BigDecimal!
  votingEscrowID_id: String! @index
  updatedAt: Int!
}

type LockSnapshot {
  id: ID!
  user_id: String! @index
  bias: BigDecimal!
  slope: BigDecimal!
  timestamp: Int! @index
}

type GaugeFactory {
  id: ID!
