type V3LBPParams {
  id: ID!
  owner: String!
  projectToken: String!
  reserveToken: String!
  projectTokenStartWeight: BigInt!
  reserveTokenStartWeight: BigInt!
  projectTokenEndWeight: BigInt!
  reserveTokenEndWeight: BigInt!
