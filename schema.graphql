}

type V3PoolTypeInfo {
  id: ID!
  address: String!
  factory_id: String! @index
  weightedParams_id: String
  stableParams_id: String
  stableSurgeParams_id: String
  gyro2Params_id: String
  gyroEParams_id: String
  quantAMMWeightedParams_id: String
  lbpParams_id: String
  fixedLBPParams_id: String
  reClammParams_id: String
}

type V3WeightedParams {
  id: ID!
  weights: [BigDecimal!]!
}

type V3StableParams {
  id: ID!
  amp: BigInt!
}

type V3StableSurgeParams {
  id: ID!
  amp: BigInt!
  maxSurgeFeePercentage: BigDecimal!
  surgeThresholdPercentage: BigDecimal!
}

type V3Gyro2Params {
  id: ID!
  sqrtAlpha: BigDecimal!
  sqrtBeta: BigDecimal!
}

type V3GyroEParams {
  id: ID!
  alpha: BigDecimal!
  beta: BigDecimal!
  c: BigDecimal!
  s: BigDecimal!
  lambda: BigDecimal!
  tauAlphaX: BigDecimal!
  tauAlphaY: BigDecimal!
  tauBetaX: BigDecimal!
  tauBetaY: BigDecimal!
  u: BigDecimal!
  v: BigDecimal!
  w: BigDecimal!
  z: BigDecimal!
  dSq: BigDecimal!
}

type V3QuantAMMWeightedParams {
  id: ID!
  oracleStalenessThreshold: BigInt!
  poolRegistry: BigInt!
  lambda: [BigInt!]!
  epsilonMax: BigInt!
  absoluteWeightGuardRail: BigInt!
  maxTradeSizeRatio: BigInt!
  updateInterval: BigInt!
  weightsAtLastUpdateInterval: [BigInt!]!
  weightBlockMultipliers: [BigInt!]!
  lastUpdateIntervalTime: BigInt!
  lastInterpolationTimePossible: BigInt!
