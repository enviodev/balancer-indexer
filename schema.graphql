# ===== Shared Entities =====

type User {
  id: ID!
  swaps: [V3Swap!]! @derivedFrom(field: "user_id")
  shares: [V3PoolShare!]! @derivedFrom(field: "user_id")
  addRemoves: [V3AddRemove!]! @derivedFrom(field: "user_id")
  bufferShares: [V3BufferShare!]! @derivedFrom(field: "user_id")
  gaugeVotes: [GaugeVote!]! @derivedFrom(field: "user_id")
  gaugeShares: [GaugeShare!]! @derivedFrom(field: "user_id")
  votingLocks: [VotingEscrowLock!]! @derivedFrom(field: "user_id")
  omniVotingLocks: [OmniVotingEscrowLock!]! @derivedFrom(field: "localUser_id")
}

type Token {
  id: ID!
  name: String!
  symbol: String!
  decimals: Int!
  address: String!
  latestUSDPrice: BigDecimal
  latestUSDPriceTimestamp: BigInt
  latestFXPrice: BigDecimal
  latestPrice_id: String
  pool_id: String
  fxOracleDecimals: Int
}

# ===== V3 Vault Entities =====

type V3Vault {
  id: ID!
  authorizer: String!
  protocolFeeController: String!
  isPaused: Boolean!
  protocolSwapFee: BigDecimal!
  protocolYieldFee: BigDecimal!
  pools: [V3Pool!]! @derivedFrom(field: "vault_id")
}

enum V3PoolType {
  Weighted
  Stable
  QuantAMMWeighted
  StableSurge
  Gyro2
  GyroE
  LBP
  FixedLBP
  ReClamm
}

type V3Pool {
  id: ID!
  vault_id: String! @index
  hook_id: String!
  hookConfig_id: String!
  liquidityManagement_id: String!
  factory: String!
  address: String! @index
  name: String!
  symbol: String!
  swapFee: BigDecimal!
  totalShares: BigDecimal!
  pauseWindowEndTime: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: String!
  isInitialized: Boolean!
  isPaused: Boolean!
  isInRecoveryMode: Boolean!
  pauseManager: String!
  swapFeeManager: String!
  poolCreator: String!
  protocolSwapFee: BigDecimal!
  protocolYieldFee: BigDecimal!
  poolCreatorSwapFee: BigDecimal!
  poolCreatorYieldFee: BigDecimal!
  swapsCount: BigInt!
  holdersCount: BigInt!
  tokens: [V3PoolToken!]! @derivedFrom(field: "pool_id")
  rateProviders: [V3RateProvider!]! @derivedFrom(field: "pool_id")
  snapshots: [V3PoolSnapshot!]! @derivedFrom(field: "pool_id")
}

type V3Hook {
  id: ID!
  address: String!
  pools: [V3Pool!]! @derivedFrom(field: "hook_id")
}

type V3HookConfig {
  id: ID!
  pool_id: String!
  hook_id: String!
  enableHookAdjustedAmounts: Boolean!
  shouldCallBeforeInitialize: Boolean!
  shouldCallAfterInitialize: Boolean!
  shouldCallComputeDynamicSwapFee: Boolean!
  shouldCallBeforeSwap: Boolean!
  shouldCallAfterSwap: Boolean!
  shouldCallBeforeAddLiquidity: Boolean!
  shouldCallAfterAddLiquidity: Boolean!
  shouldCallBeforeRemoveLiquidity: Boolean!
  shouldCallAfterRemoveLiquidity: Boolean!
}

type V3LiquidityManagement {
  id: ID!
  pool_id: String!
  disableUnbalancedLiquidity: Boolean!
  enableAddLiquidityCustom: Boolean!
  enableRemoveLiquidityCustom: Boolean!
  enableDonation: Boolean!
}

type V3PoolToken {
  id: ID!
  pool_id: String! @index
  index: Int!
  name: String!
  symbol: String!
  decimals: Int!
  address: String!
  balance: BigDecimal!
  volume: BigDecimal!
  totalSwapFee: BigDecimal!
  totalSwapFeeBase: BigDecimal!
  totalSwapFeeDelta: BigDecimal!
  totalStaticSwapFee: BigDecimal!
  totalDynamicSwapFee: BigDecimal!
  buffer_id: String
  nestedPool_id: String
  priceRate: BigDecimal!
  scalingFactor: BigInt!
  totalProtocolSwapFee: BigDecimal!
  totalProtocolYieldFee: BigDecimal!
  paysYieldFees: Boolean!
  controllerProtocolFeeBalance: BigDecimal!
  vaultProtocolSwapFeeBalance: BigDecimal!
  vaultProtocolYieldFeeBalance: BigDecimal!
}

type V3RateProvider {
  id: ID!
  pool_id: String!
  token_id: String!
  address: String!
}

type V3Buffer {
  id: ID!
  wrappedToken_id: String!
  underlyingToken_id: String!
  wrappedBalance: BigDecimal!
  underlyingBalance: BigDecimal!
  totalShares: BigDecimal!
}

type V3BufferShare {
  id: ID!
  user_id: String!
  buffer_id: String!
  balance: BigDecimal!
}

enum V3InvestType {
  Add
  Remove
}

type V3Swap {
  id: ID!
  pool: String! @index
  tokenIn: String!
  tokenInSymbol: String!
  tokenOutSymbol: String!
  tokenAmountOut: BigDecimal!
  tokenOut: String!
  tokenAmountIn: BigDecimal!
  swapFeeToken: String!
  swapFeeAmount: BigDecimal!
  swapFeeBaseAmount: BigDecimal!
  swapFeeDeltaAmount: BigDecimal!
  swapFeePercentage: BigDecimal!
  hasDynamicSwapFee: Boolean!
  user_id: String! @index
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: String!
  logIndex: BigInt!
}

type V3AddRemove {
  id: ID!
  type: V3InvestType!
  sender: String!
  amounts: [BigDecimal!]!
  pool_id: String! @index
  user_id: String! @index
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: String!
  logIndex: BigInt!
}

type V3PoolShare {
  id: ID!
  pool_id: String! @index
  user_id: String! @index
  balance: BigDecimal!
}

type V3PoolSnapshot {
  id: ID!
  pool_id: String! @index
  timestamp: Int! @index
  totalShares: BigDecimal!
  swapsCount: BigInt!
  holdersCount: BigInt!
  balances: [BigDecimal!]!
  totalSwapFees: [BigDecimal!]!
  totalStaticSwapFees: [BigDecimal!]!
  totalDynamicSwapFees: [BigDecimal!]!
  totalSwapVolumes: [BigDecimal!]!
  totalProtocolSwapFees: [BigDecimal!]!
  totalProtocolYieldFees: [BigDecimal!]!
}

# ===== V3 Pool Type Params =====

type V3Factory {
  id: ID!
  address: String!
  type: V3PoolType!
